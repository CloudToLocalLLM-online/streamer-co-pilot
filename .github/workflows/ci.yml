name: CI

on:
  push:
    branches: [main, 'zoidbot/**']
  pull_request:
    branches: [main]

jobs:
  analyze:
    name: Analyze & Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.44.x
      - run: flutter pub get
      - run: flutter analyze

  test:
    name: Test
    needs: analyze
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.44.x
      - run: flutter pub get
      - run: flutter test --coverage
      - uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/

  build-linux:
    name: Build (Linux)
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.44.x
      - run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev
      - run: flutter pub get
      - run: flutter build linux --release
      - uses: actions/upload-artifact@v4
        with:
          name: streamer-co-pilot-linux
          path: build/linux/x64/release/bundle/

  build-windows:
    name: Build (Windows)
    needs: test
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.44.x
      - run: flutter pub get
      - run: flutter build windows --release
      - uses: actions/upload-artifact@v4
        with:
          name: streamer-co-pilot-windows
          path: build/windows/x64/runner/Release/

  build-macos:
    name: Build (macOS) [disabled]
    needs: test
    # macOS builds are disabled with continue-on-error: true because:
    # 1. macOS GitHub Actions runners are expensive and have limited availability
    #    (only available on paid plans or with limited free minutes).
    # 2. The Flutter macOS build requires code signing setup which isn't configured yet.
    # 3. The app is primarily targeted at Windows and Linux desktop users.
    # To re-enable: remove continue-on-error, set up code signing certs in repo secrets,
    # and add a notarization step. See docs/macos-release.md when available.
    continue-on-error: true
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.44.x
      - run: flutter pub get
      - run: flutter build macos --release
      - uses: actions/upload-artifact@v4
        with:
          name: streamer-co-pilot-macos
          path: build/macos/Build/Products/Release/
