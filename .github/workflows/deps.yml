name: Dependencies
on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch: {}

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - run: |
          for req in services/bot-service/requirements.txt services/song-service/requirements.txt; do
            if [ -f "$req" ]; then echo "=== $req ==="; head -20 "$req"; fi
          done