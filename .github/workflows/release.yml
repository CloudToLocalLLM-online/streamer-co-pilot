name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    name: Build Windows Installer
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.44.x
      - run: flutter pub get
      - run: flutter build windows --release
      - name: Install Inno Setup
        run: |
          choco install innosetup --no-progress -y
      - name: Build Installer
        shell: pwsh
        run: |
          .\scripts\packaging\build_windows_installer.ps1
      - uses: actions/upload-artifact@v4
        with:
          name: streamer-co-pilot-windows-installer
          path: dist/windows/*.exe

  build-linux:
    name: Build Linux AppImage
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.44.x
      - run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev
      - run: flutter pub get
      - run: flutter build linux --release
      - name: Build AppImage
        run: |
          bash packaging/appimage/build-appimage.sh
      - uses: actions/upload-artifact@v4
        with:
          name: streamer-co-pilot-linux-appimage
          path: packaging/appimage/StreamerCoPilot-*.AppImage

  create-release:
    name: Create GitHub Release
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: streamer-co-pilot-windows-installer
          path: dist/
      - uses: actions/download-artifact@v4
        with:
          name: streamer-co-pilot-linux-appimage
          path: dist/
      - name: Generate Release Notes
        run: |
          echo "## Streamer Co-Pilot ${{ github.ref_name }}" > release-notes.md
          echo "" >> release-notes.md
          echo "### Downloads" >> release-notes.md
          echo "- [Windows Installer](dist/StreamerCoPilot-Windows-x64-Setup.exe)" >> release-notes.md
          echo "- [Linux AppImage](dist/StreamerCoPilot-x86_64.AppImage)" >> release-notes.md
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md
          files: |
            dist/*.exe
            dist/*.AppImage
