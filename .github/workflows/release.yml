name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: softprops/action-gh-release@v2
        with:
          name: Streamer Co-Pilot ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          draft: true
          generate_release_notes: true

  build-linux:
    needs: release
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.44.x
      - run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev
      - run: flutter pub get && flutter build linux --release
      - run: |
          mkdir -p /tmp/artifact
          cd build/linux/x64/release && tar czf /tmp/artifact/streamer-co-pilot-linux-x64.tar.gz bundle/
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: /tmp/artifact/streamer-co-pilot-linux-x64.tar.gz

  build-windows:
    name: Build Windows
    needs: release
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.44.x
      - run: flutter pub get && flutter build windows --release
      - run: |
          Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath $env:RUNNER_TEMP\streamer-co-pilot-windows-x64.zip
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: ${{ runner.temp }}\streamer-co-pilot-windows-x64.zip

  build-macos:
    name: Build macOS [disabled]
    needs: release
    continue-on-error: true
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.44.x
      - run: flutter pub get && flutter build macos --release
      - run: |
          cd build/macos/Build/Products/Release
          ditto -c -k --sequesterRsrc --keepParent "streamer_co_pilot.app" $RUNNER_TEMP/streamer-co-pilot-macos.zip
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: ${{ runner.temp }}/streamer-co-pilot-macos.zip
