<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Streamer Co-Pilot — OBS Overlay</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
  
  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: transparent;
    color: #fff;
    overflow: hidden;
    width: 100%;
    height: 100%;
  }

  /* ── Stream Status Bar ── */
  #status-bar {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 8px 14px;
    background: rgba(0, 0, 0, 0.75);
    backdrop-filter: blur(8px);
    border-radius: 10px;
    margin: 10px;
    font-size: 13px;
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 100;
    transition: opacity 0.3s;
  }
  #status-bar.disconnected { opacity: 0.4; }

  .status-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .status-dot.live { background: #ff4444; box-shadow: 0 0 8px #ff444488; }
  .status-dot.offline { background: #666; }
  .status-dot.unknown { background: #ffaa00; }

  #status-label { font-weight: 700; font-size: 14px; }
  #status-label.live { color: #ff4444; }
  #status-label.offline { color: #888; }

  #viewer-count {
    color: #aaa;
    font-size: 12px;
  }
  #viewer-count span { color: #fff; font-weight: 600; }

  #stream-title {
    flex: 1;
    text-align: right;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    color: #ccc;
    font-size: 12px;
  }

  /* ── Chat ── */
  #chat-container {
    position: fixed;
    bottom: 0;
    left: 10px;
    right: 10px;
    max-height: 60vh;
    overflow: hidden;
    padding: 4px;
  }

  #chat-list {
    display: flex;
    flex-direction: column-reverse;
    overflow-anchor: auto;
    gap: 2px;
    max-height: calc(60vh - 10px);
    overflow-y: auto;
    scrollbar-width: none;
  }
  #chat-list::-webkit-scrollbar { display: none; }

  .chat-msg {
    background: rgba(0, 0, 0, 0.6);
    backdrop-filter: blur(4px);
    padding: 6px 12px;
    border-radius: 8px;
    font-size: 14px;
    line-height: 1.4;
    animation: fadeIn 0.3s ease-out;
    display: flex;
    align-items: baseline;
    gap: 6px;
    flex-shrink: 0;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .chat-msg .time {
    color: #888;
    font-size: 11px;
    flex-shrink: 0;
  }
  .chat-msg .user {
    color: #b388ff;
    font-weight: 600;
    flex-shrink: 0;
  }
  .chat-msg .user.mod::before {
    content: "🛡️";
    margin-right: 2px;
  }
  .chat-msg .text {
    color: #eee;
    word-break: break-word;
  }

  .chat-empty {
    color: #666;
    font-size: 13px;
    text-align: center;
    padding: 20px;
  }

  /* ── Disconnected overlay ── */
  #disconnected-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(4px);
    justify-content: center;
    align-items: center;
    z-index: 200;
  }
  #disconnected-overlay.show { display: flex; }
  #disconnected-overlay .box {
    background: #1a1a2e;
    padding: 24px 32px;
    border-radius: 16px;
    text-align: center;
    border: 1px solid #333;
  }
  #disconnected-overlay h2 {
    font-size: 18px;
    margin-bottom: 8px;
  }
  #disconnected-overlay p {
    color: #888;
    font-size: 13px;
    margin-bottom: 16px;
  }
  #disconnected-overlay button {
    background: #7c3aed;
    color: #fff;
    border: none;
    padding: 10px 28px;
    border-radius: 8px;
    font-size: 14px;
    cursor: pointer;
    font-weight: 600;
  }
  #disconnected-overlay button:hover { background: #6d28d9; }

  /* ── Disconnected flash ── */
  .disconnected-flash {
    background: rgba(255, 50, 50, 0.15) !important;
  }
</style>
</head>
<body>

<!-- Status bar -->
<div id="status-bar" class="disconnected">
  <div class="status-dot unknown"></div>
  <span id="status-label">Connecting...</span>
  <span id="viewer-count"></span>
  <span id="stream-title"></span>
</div>

<!-- Chat -->
<div id="chat-container">
  <div id="chat-list">
    <div class="chat-empty">💬 Chat will appear here...</div>
  </div>
</div>

<!-- Disconnected overlay -->
<div id="disconnected-overlay" class="show">
  <div class="box">
    <h2>🔌 Disconnected</h2>
    <p id="disconnect-reason">Could not connect to the service</p>
    <button onclick="connect()">Reconnect</button>
  </div>
</div>

<script>
// ── Config ──
const params = new URLSearchParams(window.location.search);
const BOT_URL = params.get('url') || 'http://localhost:8510';
const MAX_CHAT = 100;

// ── State ──
let chatCount = 0;
let eventSource = null;
let reconnectTimer = null;

// ── DOM refs ──
const chatList = document.getElementById('chat-list');
const statusBar = document.getElementById('status-bar');
const statusDot = statusBar.querySelector('.status-dot');
const statusLabel = document.getElementById('status-label');
const viewerCount = document.getElementById('viewer-count');
const streamTitle = document.getElementById('stream-title');
const disconnectOverlay = document.getElementById('disconnected-overlay');
const disconnectReason = document.getElementById('disconnect-reason');

// ── Connect ──
async function connect() {
  disconnectOverlay.classList.remove('show');
  if (eventSource) eventSource.close();
  if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }

  // Health check first
  try {
    const res = await fetch(`${BOT_URL}/health`, { signal: AbortSignal.timeout(3000) });
    if (!res.ok) throw new Error('Health check failed');

    statusBar.classList.remove('disconnected');
    setStatus('unknown', 'Connected');

    // Get initial state
    fetchStatus();
    fetchChat();

    // SSE stream
    eventSource = new EventSource(`${BOT_URL}/events/stream`);

    eventSource.onmessage = (e) => {
      try {
        const msg = JSON.parse(e.data);
        addChat(msg);
      } catch (_) {}
    };

    eventSource.addEventListener('status', (e) => {
      try {
        const data = JSON.parse(e.data);
        setStatus(data.status || 'unknown', null, data);
      } catch (_) {}
    });

    eventSource.onerror = () => {
      scheduleReconnect();
    };

  } catch (err) {
    showDisconnected('Could not connect to service at ' + BOT_URL);
    scheduleReconnect();
  }
}

// ── Status ──
function setStatus(status, label, data) {
  statusDot.className = 'status-dot ' + status;
  statusLabel.className = status;
  statusLabel.textContent = label || (status === 'live' ? '🔴 LIVE' : status === 'offline' ? '⚫ OFFLINE' : '❓ ' + status);

  if (!data) return;
  if (data.viewers !== undefined) {
    viewerCount.innerHTML = '👁️ <span>' + data.viewers + '</span> viewers';
    viewerCount.style.display = '';
  }
  if (data.title) {
    streamTitle.textContent = data.title;
    streamTitle.style.display = '';
  } else {
    streamTitle.style.display = 'none';
  }
}

// ── Chat ──
function addChat(msg) {
  const empty = chatList.querySelector('.chat-empty');
  if (empty) empty.remove();

  const div = document.createElement('div');
  div.className = 'chat-msg';

  const time = document.createElement('span');
  time.className = 'time';
  time.textContent = msg.time || '';
  div.appendChild(time);

  const user = document.createElement('span');
  user.className = 'user' + (msg.is_mod ? ' mod' : '');
  user.textContent = msg.user || '?';
  div.appendChild(user);

  const text = document.createElement('span');
  text.className = 'text';
  text.textContent = msg.text || '';
  div.appendChild(text);

  // New messages slide in from bottom
  if (chatCount === 0) {
    chatList.appendChild(div);
  } else {
    chatList.insertBefore(div, chatList.firstChild);
  }
  chatCount++;

  // Trim
  while (chatList.children.length > MAX_CHAT) {
    chatList.removeChild(chatList.lastChild);
  }
}

// ── REST fetches ──
async function fetchStatus() {
  try {
    const res = await fetch(`${BOT_URL}/stream/status`, { signal: AbortSignal.timeout(3000) });
    if (res.ok) {
      const data = await res.json();
      setStatus(data.status || 'unknown', null, data);
    }
  } catch (_) {}
}

async function fetchChat() {
  try {
    const res = await fetch(`${BOT_URL}/chat/recent?count=30`, { signal: AbortSignal.timeout(3000) });
    if (res.ok) {
      const data = await res.json();
      const msgs = data.messages || [];
      chatList.innerHTML = '';
      chatCount = 0;
      for (const msg of msgs) {
        addChat(msg);
      }
      if (msgs.length === 0) {
        chatList.innerHTML = '<div class="chat-empty">💬 Chat will appear here...</div>';
      }
    }
  } catch (_) {}
}

// ── Reconnect ──
function scheduleReconnect() {
  statusBar.classList.add('disconnected');
  setStatus('unknown', 'Reconnecting...');
  if (reconnectTimer) return;
  reconnectTimer = setTimeout(() => {
    reconnectTimer = null;
    connect();
  }, 5000);
}

function showDisconnected(reason) {
  disconnectReason.textContent = reason;
  disconnectOverlay.classList.add('show');
  statusBar.classList.add('disconnected');
}

// ── Start ──
connect();
</script>
</body>
</html>
