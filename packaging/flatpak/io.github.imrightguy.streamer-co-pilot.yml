id: io.github.imrightguy.streamer-co-pilot
runtime: org.freedesktop.Platform
runtime-version: '24.08'
sdk: org.freedesktop.Sdk
command: streamer_co_pilot
finish-args:
  - --socket=x11
  - --socket=wayland
  - --share=network
  - --share=ipc
  - --filesystem=home
  - --device=dri

modules:
  - name: streamer-co-pilot
    buildsystem: simple
    build-commands:
      - install -Dm755 streamer_co_pilot /app/bin/streamer_co_pilot
      - install -Dm755 lib/libflutter_linux_gtk.so /app/lib/libflutter_linux_gtk.so
      - install -Dm755 lib/libwindow_manager_plugin.so /app/lib/libwindow_manager_plugin.so
      - install -Dm755 lib/libscreen_retriever_linux_plugin.so /app/lib/libscreen_retriever_linux_plugin.so
      - install -Dm755 lib/libapp.so /app/lib/libapp.so
      - install -Dm644 data/icudtl.dat /app/share/streamer-co-pilot/icudtl.dat
      - cp -r data/flutter_assets /app/share/streamer-co-pilot/
      - install -Dm644 packaging/flatpak/io.github.imrightguy.streamer-co-pilot.metainfo.xml /app/share/metainfo/io.github.imrightguy.streamer-co-pilot.metainfo.xml
      - install -Dm644 packaging/flatpak/io.github.imrightguy.streamer-co-pilot.desktop /app/share/applications/io.github.imrightguy.streamer-co-pilot.desktop
      - install -Dm644 packaging/appimage/streamer-co-pilot.png /app/share/icons/hicolor/256x256/apps/io.github.imrightguy.streamer-co-pilot.png
    sources:
      - type: dir
        path: ../../build/linux/x64/release/bundle
      - type: dir
        path: ../../packaging
